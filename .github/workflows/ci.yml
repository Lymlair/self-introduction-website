name: CI

on:
  push:
    branches: [main, dev, master] # 提交到 main 或 develop 时触发
  pull_request:
    branches: [main] # 针对 main 的 PR 时触发

# 重要：当有新提交时，自动取消正在进行的旧工作流，节省资源
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 代码规范检查
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 开启 npm 缓存，加速安装

      - name: Install Dependencies
        run: npm ci # 推荐使用 npm ci，严格按锁文件安装，更快更可靠[reference:0]

      - name: Run ESLint
        run: npm run lint # 请确保 package.json 中有这个脚本，没有的话可以跳过或自己加

      # 如果你的项目是 TypeScript，强烈建议加上类型检查
      - name: Type Check
        run: npx tsc --noEmit # 只做类型检查，不生成文件

  # 单元测试
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test # 请确保 package.json 中有对应的测试脚本

  # 构建项目（确保生产环境下能打包成功）
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, test] # 确保前置的两个 job 都成功后才运行构建
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build # Rsbuild 的构建命令，默认通常是 npm run build[reference:1]

      # （可选）上传构建产物，作为一份临时的打包留存
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/ # Rsbuild 构建后的默认输出目录是 dist，请以你项目实际为准
          retention-days: 7
